<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Sistem Kasir Garis Waktu - POS Modern dengan Manajemen Stok & Resep">
  <title>KASIR GARIS WAKTU</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    function updateThemeColor() {
      const color = getComputedStyle(document.documentElement).getPropertyValue('--primary-light').trim();
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta && color) meta.setAttribute('content', color);
    }
    document.addEventListener('DOMContentLoaded', updateThemeColor);
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
</head>

<body class="dark:bg-dark-200">
  <div id="app"></div>
  <div id="modal-container"></div>
  <div id="toast-container"></div>
  <div id="print-notifications"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBkb9M6RGsZSDSsZPnTn_NpWDZFrdL3dMY",
      authDomain: "garis-waktu-pos.firebaseapp.com",
      projectId: "garis-waktu-pos",
      storageBucket: "garis-waktu-pos.appspot.com",
      messagingSenderId: "113767699030",
      appId: "1:113767699030:web:6432c16dd4afd0218121f7"
    };
    firebase.initializeApp(firebaseConfig);
    window.dbCloud = firebase.firestore();
    dbCloud.enablePersistence({ synchronizeTabs: true }).catch(() => { });
  </script>

  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/sortableTable.js"></script>
  <script src="js/state.js"></script>
  <script src="js/realtime.js"></script>
  <script src="js/printer.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/kasir.js"></script>
  <script src="js/history.js"></script>
  <script src="js/menuManager.js"></script>
  <script src="js/bahanManager.js"></script>
  <script src="js/settings.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js')
          .then(reg => console.log('✅ Service Worker terdaftar'))
          .catch(err => console.log('❌ Service Worker gagal:', err));
      });
    }
    if (localStorage.getItem('darkMode') === 'true') {
      document.documentElement.classList.add('dark');
    }
  </script>
</body>

</html>
