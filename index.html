  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBkb9M6RGsZSDSsZPnTn_NpWDZFrdL3dMY",
      authDomain: "garis-waktu-pos.firebaseapp.com",
      projectId: "garis-waktu-pos",
      storageBucket: "garis-waktu-pos.appspot.com",
      messagingSenderId: "113767699030",
      appId: "1:113767699030:web:6432c16dd4afd0218121f7"
    };
    firebase.initializeApp(firebaseConfig);
    window.dbCloud = firebase.firestore();
    dbCloud.enablePersistence({ synchronizeTabs: true }).catch(err => {
      if (err.code === 'failed-precondition') {
        console.warn('Persistence failed: Multiple tabs');
      } else if (err.code === 'unimplemented') {
        console.warn('Persistence failed: Browser no support');
      }
    });
  </script>
